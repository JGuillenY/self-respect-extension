<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Self Respect Settings</title>
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin: 0;
    }
    
    .container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    
    h1 {
      font-size: 20px;
      margin: 0 0 20px 0;
      text-align: center;
      font-weight: 600;
    }
    
    .status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 8px;
    }
    
    .toggle {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 26px;
    }
    
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.3);
      transition: .4s;
      border-radius: 34px;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background-color: #4CAF50;
    }
    
    input:checked + .slider:before {
      transform: translateX(24px);
    }
    
    .stats {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
    
    .stat-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
    }
    
    .stat-value {
      font-weight: 600;
    }
    
    .categories {
      margin-top: 15px;
    }
    
    .category-item {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      font-size: 13px;
    }
    
    .category-item input {
      margin-right: 10px;
    }
    
    .footer {
      text-align: center;
      font-size: 12px;
      opacity: 0.8;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    button {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
      transition: background 0.3s;
    }
    
    button:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌱 Self Respect</h1>
    
    <div class="status">
      <span>Extension Status:</span>
      <label class="toggle">
        <input type="checkbox" id="toggleEnabled" checked>
        <span class="slider"></span>
      </label>
    </div>
    
    <div class="stats">
      <div class="stat-item">
        <span>Protected Categories:</span>
        <span class="stat-value" id="categoryCount">3</span>
      </div>
      <div class="stat-item">
        <span>Blocked Domains:</span>
        <span class="stat-value" id="domainCount">50+</span>
      </div>
      <div class="stat-item">
        <span>Status:</span>
        <span class="stat-value" id="statusText">Active</span>
      </div>
    </div>
    
    <div class="categories">
      <h3 style="font-size: 14px; margin-bottom: 10px;">Protected Categories:</h3>
      <div id="categoriesList">
        <div class="category-item">
          <input type="checkbox" id="category-adult" checked disabled>
          <label for="category-adult">Adult Content (30+ sites)</label>
        </div>
        <div class="category-item">
          <input type="checkbox" id="category-social" checked disabled>
          <label for="category-social">Social Media (10+ sites)</label>
        </div>
        <div class="category-item">
          <input type="checkbox" id="category-gambling" checked disabled>
          <label for="category-gambling">Gambling (15+ sites)</label>
        </div>
      </div>
    </div>
    
    <button id="customizeBtn">Customize Settings</button>
    <button id="viewStatsBtn">View Statistics</button>
    
    <div class="footer">
      Protecting your self-respect and digital wellbeing.<br>
      Every redirect is a step toward your better self.
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
